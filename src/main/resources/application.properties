##### BANCO DE DADOS
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.datasource.jdbc.url=jdbc:h2:mem:desenvdb;INIT=RUNSCRIPT FROM 'classpath:scriptInicial.sql'
quarkus.hibernate-orm.log.sql=false

# Executar os rest locais.
quarkus.rest-client.executar-task-host.url=http://localhost:8080

##### BANCO DE DADOS NO MODO TESTE
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;INIT=RUNSCRIPT FROM 'classpath:scriptInicial.sql'
%test.quarkus.hibernate-orm.log.sql=false
%test.quarkus.scheduler.enabled=false

# Reduzir o pacote do log.
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{1.}] (%t) %s%e%n
